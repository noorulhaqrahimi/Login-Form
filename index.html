<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Login</title>
</head>
<body class="bg-[#585BC7]">

    <div class="flex justify-center items-center mt-28">
         <div class="flex rounded-xl justify-center items-center flex-col gap-4 bg-white w-[450px] h-[600px]">
        <h1 class="text-[30px] font-semibold -mt-16 pt-16 ">Login</h1>
        <input type="email" placeholder="Email" class="border-b mt-12 mb-5 bg-white focus:outline-none focus:ring-0 border-black w-[330px] h-9 pl-2 border-gray-500">
        <input type="password" placeholder="Password" class="border-b mb-5 bg-white focus:outline-none focus:ring-0 border-black w-[330px] h-9 pl-2 border-gray-500">
        <button class="-mb-9 mt-9 w-[310px] hover:scale-105 duration-500 bg-linear-to-r from-indigo-500 via-purple-500 to-pink-500 py-4 bg-[#2974BA] text-[#fff] font-semibold">Login</button>
        <br /> <br />
        <h2>Forgot <span class="text-blue-600 cursor-pointer">Password?</span></h2>
        <h2>Dont have an account? <span class="text-blue-600 cursor-pointer">Sign up</span></h2>
    </div>
    </div>
   
    
</body>
</html>
